<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>🇦🇷 Votos Argentina</title>

<style>

body{
    font-family:Arial;
    text-align:center;
    background:#6EC6FF;
    color:white;
}

.caja{
    background:white;
    color:#0033A0;
    width:90%;
    max-width:600px;
    margin:40px auto;
    padding:30px;
    border-radius:20px;
}

button{
    padding:15px 30px;
    font-size:20px;
    background:#00AEEF;
    color:white;
    border:0;
    border-radius:15px;
}

.barra{
    width:100%;
    height:30px;
    background:#ddd;
    border-radius:20px;
}

.progreso{
    height:100%;
    width:0%;
    background:#008cff;
    border-radius:20px;
}

</style>

</head>


<body>


<div class="caja">

<h1>🇦🇷 ¡Vota por Argentina!</h1>

<h2 id="contador">
Cargando votos...
</h2>


<div class="barra">
<div class="progreso" id="barra"></div>
</div>


<br>


<button onclick="votar()">
❤️ Votar
</button>


<p id="mensaje"></p>


</div>



<script>


// CAMBIA ESTO CON TU BIN ID
const BIN_ID = "6a558480f5f4af5e298b1895";


// CAMBIA ESTO CON TU API KEY
const API_KEY = "$2a$10$n4Mvmp7E/gw9AcSExuyo3OrQNHVh3GZHqfA3xYCDsLLGnEFQUe33m";



const meta = 1000000;



// Mostrar votos

async function cargarVotos(){

    let respuesta = await fetch(
    `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`
    );


    let datos = await respuesta.json();


    mostrar(datos.record.votos);

}




function mostrar(votos){

    document.getElementById("contador").innerHTML =
    "🎯 " + votos + " / " + meta + " votos";


    document.getElementById("barra").style.width =
    (votos/meta*100)+"%";

}




// Cuando aprietan votar

async function votar(){


    let respuesta = await fetch(
    `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`
    );


    let datos = await respuesta.json();


    let nuevosVotos = datos.record.votos + 1;



    await fetch(
    `https://api.jsonbin.io/v3/b/${BIN_ID}`,
    {

        method:"PUT",

        headers:{
        "Content-Type":"application/json",
        "X-Master-Key":API_KEY
        },


        body:JSON.stringify({

        votos:nuevosVotos

        })

    });


    mostrar(nuevosVotos);


    document.getElementById("mensaje").innerHTML =
    "✅ ¡Voto registrado! 🇦🇷";


}



cargarVotos();



</script>


</body>

</html>
